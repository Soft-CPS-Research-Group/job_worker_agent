version: "3.9"

services:
  worker_agent_deucalion:
    image: ${WORKER_IMAGE:-calof/job_worker_agent:latest}
    container_name: ${WORKER_CONTAINER_NAME:-worker-agent-deucalion}
    environment:
      OPEVA_SERVER: ${OPEVA_SERVER:-http://localhost:8000}
      WORKER_ID: ${WORKER_ID:-deucalion}
      OPEVA_SHARED_DIR: ${OPEVA_SHARED_DIR:-/mnt/opeva_shared}
      WORKER_EXECUTOR: deucalion
      POLL_INTERVAL: ${POLL_INTERVAL:-5}
      WORKER_HEARTBEAT_INTERVAL: ${WORKER_HEARTBEAT_INTERVAL:-30}
      STATUS_POLL_INTERVAL: ${STATUS_POLL_INTERVAL:-10}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DEUCALION_SSH_HOST: ${DEUCALION_SSH_HOST}
      DEUCALION_SSH_USER: ${DEUCALION_SSH_USER}
      DEUCALION_SSH_PORT: ${DEUCALION_SSH_PORT:-22}
      DEUCALION_SSH_KEY_PATH: ${DEUCALION_SSH_KEY_PATH:-/etc/opeva/deucalion/id_ed25519}
      DEUCALION_SSH_KNOWN_HOSTS: ${DEUCALION_SSH_KNOWN_HOSTS:-/etc/opeva/deucalion/known_hosts}
      DEUCALION_REMOTE_ROOT: ${DEUCALION_REMOTE_ROOT:-/projects/F202508843CPCAA0/tiagocalof}
      DEUCALION_SIF_PATH: ${DEUCALION_SIF_PATH}
      DEUCALION_SIF_COMMAND_MODE: ${DEUCALION_SIF_COMMAND_MODE:-run}
      DEUCALION_POLL_INTERVAL: ${DEUCALION_POLL_INTERVAL:-10}
      DEUCALION_SYNC_INTERVAL: ${DEUCALION_SYNC_INTERVAL:-15}
      DEUCALION_UNREACHABLE_GRACE_SECONDS: ${DEUCALION_UNREACHABLE_GRACE_SECONDS:-900}
      DEUCALION_UNKNOWN_STATE_TIMEOUT_SECONDS: ${DEUCALION_UNKNOWN_STATE_TIMEOUT_SECONDS:-300}
      DEUCALION_SLURM_ACCOUNT_CPU: ${DEUCALION_SLURM_ACCOUNT_CPU:-f202508843cpcaa0x}
      DEUCALION_SLURM_ACCOUNT_GPU: ${DEUCALION_SLURM_ACCOUNT_GPU:-f202508843cpcaa0g}
      DEUCALION_SLURM_PARTITION_CPU: ${DEUCALION_SLURM_PARTITION_CPU:-normal-x86}
      DEUCALION_SLURM_PARTITION_GPU: ${DEUCALION_SLURM_PARTITION_GPU:-normal-a100-80}
      DEUCALION_SLURM_TIME: ${DEUCALION_SLURM_TIME:-04:00:00}
      DEUCALION_SLURM_CPUS_PER_TASK: ${DEUCALION_SLURM_CPUS_PER_TASK:-4}
      DEUCALION_SLURM_MEM_GB: ${DEUCALION_SLURM_MEM_GB:-16}
      DEUCALION_SLURM_GPUS: ${DEUCALION_SLURM_GPUS:-0}
    volumes:
      - ${LOCAL_SHARED_DIR:-/mnt/opeva_shared}:${OPEVA_SHARED_DIR:-/mnt/opeva_shared}
      - ${DEUCALION_SSH_KEY_PATH_HOST:-/etc/opeva/deucalion/id_ed25519}:${DEUCALION_SSH_KEY_PATH:-/etc/opeva/deucalion/id_ed25519}:ro
      - ${DEUCALION_SSH_KNOWN_HOSTS_HOST:-/etc/opeva/deucalion/known_hosts}:${DEUCALION_SSH_KNOWN_HOSTS:-/etc/opeva/deucalion/known_hosts}:ro
    restart: unless-stopped
